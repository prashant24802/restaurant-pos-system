<div class="menu-container">

  <div class="header">

    <h2>Menu Items</h2>

    <button
      mat-raised-button
      color="primary"
      (click)="openAddDialog()">

      Add Item

    </button>

  </div>

  <mat-form-field appearance="outline">

    <mat-label>Search Menu</mat-label>

    <input
      matInput
      [(ngModel)]="query.search"
      (ngModelChange)="onSearch()"
      placeholder="Search by name, category or description...">

  </mat-form-field>

  <!-- Loading Spinner -->

  <div
    class="loading-container"
    *ngIf="loading">

    <mat-spinner
      diameter="50">
    </mat-spinner>

    <p>Loading menu items...</p>

  </div>

  <!-- Empty State -->

  <div
    class="empty-state"
    *ngIf="!loading && menuItems.length === 0">

    <h3>🍽 No menu items found</h3>

    <p>Try changing your search criteria.</p>

  </div>

  <!-- Menu Table -->

  <table
    *ngIf="!loading && menuItems.length > 0"
    mat-table
    [dataSource]="menuItems"
    matSort
    (matSortChange)="sortData($event)"
    class="mat-elevation-z4">

    <!-- ID -->

    <ng-container matColumnDef="id">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="id">

        ID

      </th>

      <td mat-cell *matCellDef="let item">

        {{ item.id }}

      </td>

    </ng-container>

    <!-- Name -->

    <ng-container matColumnDef="name">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="name">

        Name

      </th>

      <td mat-cell *matCellDef="let item">

        {{ item.name }}

      </td>

    </ng-container>

    <!-- Category -->

    <ng-container matColumnDef="category">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="categoryName">

        Category

      </th>

      <td mat-cell *matCellDef="let item">

        {{ item.categoryName }}

      </td>

    </ng-container>

    <!-- Price -->

    <ng-container matColumnDef="price">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="price">

        Price

      </th>

      <td mat-cell *matCellDef="let item">

        ₹{{ item.price }}

      </td>

    </ng-container>

    <!-- Actions -->

    <ng-container matColumnDef="actions">

      <th mat-header-cell *matHeaderCellDef>

        Actions

      </th>

      <td mat-cell *matCellDef="let item">

        <button
          mat-icon-button
          color="primary"
          (click)="editItem(item)">

          <mat-icon>edit</mat-icon>

        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="deleteItem(item)">

          <mat-icon>delete</mat-icon>

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns">
    </tr>

  </table>

  <!-- Paginator -->

  <mat-paginator
    *ngIf="!loading && menuItems.length > 0"
    [length]="totalElements"
    [pageSize]="query.size"
    [pageIndex]="query.page"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPageChange($event)">
  </mat-paginator>

</div>
