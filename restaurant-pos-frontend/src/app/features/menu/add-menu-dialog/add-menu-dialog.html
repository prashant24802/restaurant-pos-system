<h2 mat-dialog-title>Add Menu Item</h2>

<mat-dialog-content>

  <mat-form-field appearance="outline">

    <mat-label>Name</mat-label>

    <input matInput>

  </mat-form-field>

  <mat-form-field appearance="outline">

    <mat-label>Description</mat-label>

    <input matInput>

  </mat-form-field>

  <mat-form-field appearance="outline">

    <mat-label>Price</mat-label>

    <input
      matInput
      type="number">

  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button>
    Cancel
  </button>

  <button
    mat-raised-button
    color="primary">

    Save

  </button>

</mat-dialog-actions>
