<div class="login-container">

    <h1>Restaurant POS</h1>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

        <input
            type="email"
            placeholder="Email"
            formControlName="email">

        <input
            type="password"
            placeholder="Password"
            formControlName="password">

        <button type="submit">

            Login

        </button>

    </form>

</div>
