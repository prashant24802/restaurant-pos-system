<div class="table-container">

  <div class="header">

    <h2>Restaurant Tables</h2>

    <button
      mat-raised-button
      color="primary"
      (click)="openAddDialog()">

      Add Table

    </button>

  </div>

  <!-- Filters -->

  <div
    style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:20px;">

    <!-- Search -->

    <mat-form-field appearance="outline">

      <mat-label>Search</mat-label>

      <input
        matInput
        [(ngModel)]="query.search"
        (ngModelChange)="onSearch()"
        placeholder="Search by table number">

    </mat-form-field>

    <!-- Status -->

    <mat-form-field appearance="outline">

      <mat-label>Status</mat-label>

      <mat-select
        [(ngModel)]="query.status"
        (selectionChange)="onStatusChange()">

        <mat-option [value]="null">

          All Status

        </mat-option>

        <mat-option
          *ngFor="let status of statuses"
          [value]="status.value">

          {{ status.label }}

        </mat-option>

      </mat-select>

    </mat-form-field>

    <!-- Clear -->

    <button
      mat-stroked-button
      color="primary"
      (click)="clearFilters()">

      Clear Filters

    </button>

  </div>

  <!-- Loading -->

  <div
    class="loading-container"
    *ngIf="loading">

    <mat-spinner diameter="50"></mat-spinner>

    <p>Loading tables...</p>

  </div>

  <!-- Empty -->

  <div
    class="empty-state"
    *ngIf="!loading && tables.length===0">

    <h3>🪑 No Tables Found</h3>

    <p>No restaurant tables available.</p>

  </div>

  <!-- Table -->

  <table
    *ngIf="!loading && tables.length>0"
    mat-table
    [dataSource]="tables"
    matSort
    (matSortChange)="sortData($event)"
    class="mat-elevation-z4">

    <!-- ID -->

    <ng-container matColumnDef="id">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="id">

        ID

      </th>

      <td
        mat-cell
        *matCellDef="let table">

        {{ table.id }}

      </td>

    </ng-container>

    <!-- Table Number -->

    <ng-container matColumnDef="tableNumber">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="tableNumber">

        Table

      </th>

      <td
        mat-cell
        *matCellDef="let table">

        {{ table.tableNumber }}

      </td>

    </ng-container>

    <!-- Capacity -->

    <ng-container matColumnDef="capacity">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="capacity">

        Capacity

      </th>

      <td
        mat-cell
        *matCellDef="let table">

        {{ table.capacity }}

      </td>

    </ng-container>

    <!-- Status -->

    <ng-container matColumnDef="status">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header="status">

        Status

      </th>

      <td
        mat-cell
        *matCellDef="let table">

        <span
          [ngClass]="{

            'available': table.status==='AVAILABLE',

            'occupied': table.status==='OCCUPIED',

            'reserved': table.status==='RESERVED',

            'out': table.status==='OUT_OF_SERVICE'

          }">

          {{ getStatusLabel(table.status) }}

        </span>

      </td>

    </ng-container>

    <!-- Actions -->

    <ng-container matColumnDef="actions">

      <th
        mat-header-cell
        *matHeaderCellDef>

        Actions

      </th>

      <td
        mat-cell
        *matCellDef="let table">

        <button
          mat-icon-button
          color="primary"
          (click)="editTable(table)">

          <mat-icon>

            edit

          </mat-icon>

        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="deleteTable(table)">

          <mat-icon>

            delete

          </mat-icon>

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>

    <tr
      mat-row
      *matRowDef="let row;columns:displayedColumns">
    </tr>

  </table>

  <!-- Pagination -->

  <mat-paginator

    *ngIf="!loading && tables.length>0"

    [length]="totalElements"

    [pageIndex]="query.page"

    [pageSize]="query.size"

    [pageSizeOptions]="[5,10,20]"

    (page)="onPageChange($event)">

  </mat-paginator>

</div>
